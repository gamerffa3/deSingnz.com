<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>de-SIGNz Interiors & Builders</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f7fb;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#0a2a66;
color:#fff;
padding:15px;
text-align:center;
font-weight:600;
letter-spacing:1px;
z-index:1000;
}

/* SECTIONS */
section{
padding:90px 20px;
min-height:100vh;
}

/* HERO */
.hero{
position:relative;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
display:flex;
align-items:center;
color:#fff;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
top:0;
left:0;
}

.hero-content{
position:relative;
z-index:1;
max-width:300px;
}

.hero h1{
font-size:30px;
margin-bottom:10px;
}

.hero p{
font-size:14px;
opacity:0.9;
}

/* CARDS */
.card{
background:#fff;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

/* CONTACT */
.contact a{
display:block;
margin-top:10px;
text-decoration:none;
color:#0a2a66;
font-weight:500;
}

/* FLOAT BUTTONS */
.float{
position:fixed;
right:10px;
bottom:80px;
display:flex;
flex-direction:column;
gap:10px;
}

.float a{
background:#0a2a66;
color:#fff;
padding:12px;
border-radius:8px;
text-decoration:none;
font-size:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
border-top:1px solid #ccc;
}

nav a{
padding:12px;
font-size:12px;
text-decoration:none;
color:#333;
transition:0.3s;
}

nav a.active{
color:#0a2a66;
font-weight:bold;
}
</style>
</head>

<body>

<header>de-SIGNz Interiors & Builders</header>

<!-- HOME -->
<section id="home" class="hero">
<div class="hero-content">
<h1>Modern Interior Designs</h1>
<p>Premium Interior & Construction Solutions</p>
</div>
</section>

<!-- OFFERS -->
<section id="offers">
<h2>Offers</h2>
<div class="card">20% Discount on Modular Kitchen</div>
<div class="card">Free Site Visit</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1600210492493-0946911123ea">
<img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6">
<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
<img src="https://images.unsplash.com/photo-1616594039964-ae9021a400a0">
</div>
</section>

<!-- MENU -->
<section id="menu">
<h2>Menu</h2>
<div class="card">About Us</div>
<div class="card">Services</div>

<div class="card contact">
<h3>Contact</h3>
<a href="tel:9744549856">Call 9744549856</a>
<a href="tel:9539925568">Call 9539925568</a>
<a href="https://wa.me/919744549856" target="_blank">WhatsApp Chat</a>
</div>
</section>

<!-- FLOAT -->
<div class="float">
<a href="https://wa.me/919744549856" target="_blank">WhatsApp</a>
<a href="tel:9744549856">Call</a>
</div>

<!-- NAV -->
<nav>
<a href="#home" class="active">Home</a>
<a href="#offers">Offers</a>
<a href="#gallery">Gallery</a>
<a href="#menu">Menu</a>
</nav>

<script>
const links = document.querySelectorAll("nav a");

window.addEventListener("scroll", () => {
let fromTop = window.scrollY + 100;

links.forEach(link => {
let section = document.querySelector(link.getAttribute("href"));

if (
section.offsetTop <= fromTop &&
section.offsetTop + section.offsetHeight > fromTop
) {
links.forEach(l => l.classList.remove("active"));
link.classList.add("active");
}
});
});
</script>

</body>
</html>
