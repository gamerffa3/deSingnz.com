/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#0a2a66;
color:#fff;
padding:15px;
text-align:center;
font-weight:600;

.hero{
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
display:flex;
align-items:center;
color:#fff;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero-text{
position:relative;
z-index:1;
max-width:300px;
}

.hero h1{font-size:30px;margin-bottom:10px}

/* CARD */
.card{
background:#fff;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.gallery img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* CONTACT */
.contact a{
display:block;
margin-top:8px;
padding:10px;
background:#f1f4ff;
border-radius:8px;
text-decoration:none;
color:#0a2a66;
font-weight:500;
}

.contact a:hover{
background:#0a2a66;
color:#fff;
}

/* FLOAT */
.float{
position:fixed;
right:10px;
bottom:80px;
display:flex;
flex-direction:column;
gap:10px;
}

.float a{
background:#0a2a66;
color:#fff;
padding:12px;
border-radius:8px;
text-decoration:none;
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
border-top:1px solid #ccc;
}

nav a{
padding:12px;
font-size:12px;
text-decoration:none;
color:#333;
}
